<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Book App</title>
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body class="login-bg">

  <video autoplay muted loop id="bg-video">
    <source th:src="@{/videos/landing-bg.mp4}" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Animated background particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-container glass">
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">BookApp</span>
      </div>
      <div class="login-badge">
        <span>🔐 Secure Admin Access</span>
      </div>
    </div>

    <form th:action="@{/login}" method="post" autocomplete="off">
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to manage your library</p>

      <div class="form-group floating-label">
        <input type="text" id="username" name="username" required />
        <label for="username">Username</label>
        <div class="input-icon">👤</div>
      </div>

      <div class="form-group floating-label">
        <input type="password" id="password" name="password" required />
        <label for="password">Password</label>
        <div class="input-icon">🔒</div>
        <span class="toggle-password" onclick="togglePassword()">👁️</span>
      </div>

      <button type="submit" class="btn gradient btn-primary">
        <span class="btn-icon">🚀</span>
        <span>Sign In</span>
      </button>

      <p>
        <a th:href="@{/forgot-password.html}" class="forgot-link">Forgot your password?</a>
      </p>

      <div class="login-footer">
        <p>Demo Credentials: <b>admin / admin123</b></p>
      </div>

      <!-- Error message from backend -->
      <div class="login-error" th:if="${msg != null}">
        <p th:text="${msg}">Invalid login</p>
      </div>
    </form>
  </div>

  <!-- Floating elements -->
  <div class="floating-elements">
    <div class="floating-element element-1">📖</div>
    <div class="floating-element element-2">✏️</div>
    <div class="floating-element element-3">🔍</div>
  </div>

  <script th:src="@{/script.js}"></script>
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
