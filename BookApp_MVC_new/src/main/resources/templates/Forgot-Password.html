<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Book App</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="forgot-password-bg">

  <video autoplay muted loop id="bg-video">
    <source th:src="@{/videos/landing-bg.mp4}" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Animated background particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <header>
    <nav>
      <a th:href="@{/}" class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">BookApp</span>
      </a>
      <div class="nav-links">
        <a th:href="@{/}" class="nav-link">🏠 Home</a>
        <a th:href="@{/view-books}" class="nav-link">📚 All Books</a>
        <a th:href="@{/search}" class="nav-link">🔍 Search</a>
        <a th:href="@{/login}" class="nav-link">🔑 Login</a>
      </div>
    </nav>
  </header>

  <main class="forgot-password-container glass">
    <div class="forgot-header">
      <h2>🔑 Forgot Your Password?</h2>
      <p class="forgot-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form th:action="@{/forgot-password}" method="post" class="forgot-form" th:object="${forgotRequest}">
      <div class="input-group">
        <label for="forgotEmail">📧 Email Address</label>
        <input type="email" id="forgotEmail" th:field="*{email}" placeholder="Enter your email" required>
      </div>
      <button type="submit" class="btn gradient btn-primary">Send Reset Link</button>
    </form>

    <p th:if="${msg != null}" th:text="${msg}" id="forgotMsg" class="forgot-msg"></p>

    <a th:href="@{/login}" class="back-to-login">⬅️ Back to Login</a>
  </main>

  <!-- Floating elements -->
  <div class="floating-elements">
    <div class="floating-element element-1">📖</div>
    <div class="floating-element element-2">✏️</div>
    <div class="floating-element element-3">🔍</div>
  </div>

  <script th:src="@{/script.js}"></script>
</body>
</html>
