<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home - Book App</title>
  <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body class="admin-home-bg">

  <video autoplay muted loop id="bg-video">
    <source th:src="@{/videos/landing-bg.mp4}" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Animated background particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <header>
    <nav>
      <a th:href="@{/}" class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">BookApp</span>
      </a>
      <div class="nav-links">
        <a th:href="@{/}" class="nav-link">🏠 Home</a>
        <a th:href="@{/view-books}" class="nav-link">📚 View Books</a>
        <a th:href="@{/search}" class="nav-link">🔍 Search</a>
        <a th:href="@{/print-books}" class="nav-link auth-only">🖨️ Print</a>
      </div>
    </nav>
  </header>

  <main class="admin-form-container glass">
    <div class="form-header">
      <h2>📚 Add New Book</h2>
      <p class="form-subtitle">Expand your library with new titles</p>
    </div>

    <!-- Submit to Thymeleaf controller route -->
    <form th:action="@{/add-book}" method="post" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group floating-label">
          <input type="text" id="bookName" name="bookName" required />
          <label for="bookName">📖 Book Name</label>
          <div class="input-icon">📖</div>
        </div>
        <div class="form-group floating-label">
          <input type="text" id="author" name="author" required />
          <label for="author">✍️ Author</label>
          <div class="input-icon">✍️</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group floating-label">
          <input type="text" id="publisher" name="publisher" required />
          <label for="publisher">🏢 Publisher</label>
          <div class="input-icon">🏢</div>
        </div>
        <div class="form-group floating-label">
          <input type="number" id="price" name="price" min="0" step="0.01" required />
          <label for="price">💰 Price</label>
          <div class="input-icon">💰</div>
        </div>
      </div>

      <div class="form-group floating-label">
        <textarea id="description" name="description" rows="3" required></textarea>
        <label for="description">📝 Description</label>
        <div class="input-icon">📝</div>
      </div>

      <div class="form-group file-upload">
        <label for="image">🖼️ Book Image</label>
        <div class="file-input-wrapper">
          <input type="file" id="image" name="image" accept="image/*" required />
          <div class="file-input-label">
            <span class="file-icon">📁</span>
            <span>Choose an image file</span>
          </div>
        </div>
      </div>

      <button type="submit" class="btn gradient btn-primary">
        <span class="btn-icon">➕</span>
        <span class="auth-only">Add Book</span>
      </button>
    </form>
  </main>

  <!-- Floating elements -->
  <div class="floating-elements">
    <div class="floating-element element-1">📚</div>
    <div class="floating-element element-2">✏️</div>
    <div class="floating-element element-3">🔍</div>
  </div>

  <script th:src="@{/script.js}"></script>
</body>
</html>
